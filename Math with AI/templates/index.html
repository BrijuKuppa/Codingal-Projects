<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova: Your Math Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
    <link rel="icon" type="image/webp" href="{{ url_for('static', filename='favicon.webp') }}">
</head>
<body>
    <div class="sidebar">
        <button class="nova"><img src="{{ url_for('static', filename='favicon.webp') }}" alt="Nova Logo" class="logo"><h1>Nova</h1></button>
        <button class="download_conv" onclick="download()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-down" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M3.5 10a.5.5 0 0 1-.5-.5v-8a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 0 0 1h2A1.5 1.5 0 0 0 14 9.5v-8A1.5 1.5 0 0 0 12.5 0h-9A1.5 1.5 0 0 0 2 1.5v8A1.5 1.5 0 0 0 3.5 11h2a.5.5 0 0 0 0-1z"/><path fill-rule="evenodd" d="M7.646 15.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 14.293V5.5a.5.5 0 0 0-1 0v8.793l-2.146-2.147a.5.5 0 0 0-.708.708z"/></svg><h2 id="download-id">Download</h2></button>
        <button class="reset_conv" type="submit" onclick="reset()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-clockwise" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/></svg><h2>Reset</h2></button>
    </div>

    <div class="chatbot">
        <div class="output">
            <h1 class="title">Nova</h1>
            <p class="description">How can we help you in math?</p>
        </div>
        <div class="inputarea">
            <input class="input" placeholder="Ask anything..."><button class="submit" onclick="getoutput()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-up-short" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 12a.5.5 0 0 0 .5-.5V5.707l2.146 2.147a.5.5 0 0 0 .708-.708l-3-3a.5.5 0 0 0-.708 0l-3 3a.5.5 0 1 0 .708.708L7.5 5.707V11.5a.5.5 0 0 0 .5.5"/></svg></button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>

    function copy_btn(element){
        const parent = element.parentElement.parentElement;
        const child_elem = parent.firstElementChild;
        navigator.clipboard.writeText(child_elem.textContent);

        element.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-check-lg" viewBox="0 0 16 16">
        <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"/>
        </svg>
        `

        setTimeout(() => {
            element.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-clipboard" viewBox="0 0 16 16"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/></svg>
            `
        }, 1000)
    };


    async function getoutput() {
        const input = document.getElementsByClassName("input")[0];
        const output = document.querySelector(".output");
        const submit = document.getElementsByClassName("submit")[0];
        const title = document.getElementsByClassName("title")[0];
        const description = document.getElementsByClassName("description")[0];
        console.log(output)
        submit.disabled = true;
        title.style.display = "none";
        description.style.display = "none";

        if (input.value.trim() === "") {
            submit.disabled = false;
            return;
        }

        output.insertAdjacentHTML("beforeend", ` 
            <div class="outer">
                <div class="user">
                    <div class="user_text">${input.value}</div>
                    <div class="user_menu"><button class="user_menu_button" onclick="copy_btn(this)"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-clipboard" viewBox="0 0 16 16"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/></svg></button></div>
                </div>
            </div>`
        );

        try {
            await new Promise(resolve => setTimeout(resolve, 20));
            const loading_div = document.createElement("div");
            loading_div.className = "spinner";
            output.appendChild(loading_div);

            let result = await fetch("/generate", {method: "POST", headers: {"Content-Type" : "application/json"}, body: JSON.stringify(input.value)});

            if (!result.ok) {
                loading_div.remove();
                output.insertAdjacentHTML("beforeend", `
                <div class="response" style="color: red;">There was an error getting the output. Please contact support.</div>
                `)
                submit.disabled = false;
                return;
            };

            let data = await result.json();
            let reply = data.reply;

            loading_div.remove();

            output.scrollTo({top: output.scrollHeight, behavior: "smooth"});

            const response_div = document.createElement("div");
            response_div.className = "response";
            output.appendChild(response_div);

            async function loop(){
            let buffer = ""
                for (let i = 0; i < reply.length; i++){
                    buffer += reply[i];
                    response_div.innerHTML = marked.parse(buffer);
                    await new Promise(resolve => setTimeout(resolve, 10));
                    output.scrollTo({top: output.scrollHeight, behavior: "smooth"})
                }
            await MathJax.typesetPromise([response_div]);
            }
            await loop()

        } catch (error){
            loading_div.remove();
            output.insertAdjacentHTML("beforeend", `
                <div class="response" style="color: red;">${error}</div>
            `)
        }

        submit.disabled = false;
        input.value = "";
    };


    async function download() {
        const download_btn = document.getElementsByClassName("download_conv")[0]
        const title = document.getElementById("download-id")
        
        try {
            let result = await fetch("/download")

            if (!result.ok) {
                download_id.style.color = "red";
                download_id.innerHTML = "Aborted";

                await new Promise(resolve => setTimeout(resolve, 1000));

                download_id.style.color = "white";
                download_id.innerHTML = "Download";
                return;
            }

            let data = await result.json();
            let conversation = data.conversation;
            let new_conv = ""

            for (let i in conversation){
                new_conv = new_conv + i + "\n"
            }

            const file = new Blob([new_conv], { type : "text/plain"});

            const link = document.createElement("a");
            link.href = URL.createObjectURL(file);
            link.download = "conversation_history";
            link.click();
            URL.revokeObjectURL(link.href);

            download_btn.disabled = true;
            await new Promise(resolve => setTimeout(resolve, 3));
            download_btn.disabled = false;


        } catch {
            download_id.style.color = "red";
                download_id.innerHTML = "Aborted";

                await new Promise(resolve => setTimeout(resolve, 1000));

                download_id.style.color = "white";
                download_id.innerHTML = "Download";
                return;
        }
    }

    async function reset(){
        try{
            await fetch('/reset_conv', {method : "POST", headers : {"Content-Type" : "application/json"}, body : JSON.stringify({"message" : "nothing"})})
            location.reload()
        } catch {
            alert(`Something went wrong... (${error})`);
        }
    };

</script>
</body>
</html>
